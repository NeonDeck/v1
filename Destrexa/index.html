<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cryplay | Crypto Gaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#home" aria-label="Cryplay home">
          <img class="brand-logo" src="img/logo.png" alt="" />
          <span>
            <strong>Cryplay</strong>
            <small>crypto gaming</small>
          </span>
        </a>

        <nav class="desktop-nav" aria-label="Primary navigation">
          <a href="#home" data-route="home">Home</a>
          <a href="#games" data-route="games">Games</a>
          <a href="#coins" data-route="coins">Coins</a>
          <a href="#profile" data-route="profile">Profile</a>
        </nav>

        <div class="account-strip">
          <a class="coin-pill" href="#coins" aria-label="Coin balance">
            <span class="coin-dot"></span>
            <span id="coinBalance" data-coin-balance>0</span>
          </a>
          <button class="auth-button" type="button" data-auth-open>Enter Arena</button>
          <a class="avatar-button" href="#profile" aria-label="Profile" hidden>CP</a>
        </div>
      </header>

      <main id="app" class="page" tabindex="-1"></main>
    </div>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a href="#home" data-route="home">
        <span class="nav-icon">H</span>
        Home
      </a>
      <a href="#games" data-route="games">
        <span class="nav-icon">G</span>
        Games
      </a>
      <a href="#coins" data-route="coins">
        <span class="nav-icon">C</span>
        Coins
      </a>
      <a href="#profile" data-route="profile">
        <span class="nav-icon">P</span>
        Profile
      </a>
    </nav>

    <div class="auth-modal" id="authModal" aria-hidden="true">
      <div class="auth-backdrop" data-auth-close></div>
      <section class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <button class="auth-close" type="button" data-auth-close aria-label="Close auth panel">X</button>
        <div class="auth-brand">
          <img class="brand-logo" src="img/logo.png" alt="" />
          <div>
            <p class="eyebrow">Cryplay access</p>
            <h2 id="authTitle">Enter Arena</h2>
          </div>
        </div>
        <p class="auth-copy">Use one Cryplay username. If it exists, we log you in. If it is new, we create your arena account automatically.</p>

        <form class="auth-form" id="authForm">
          <label>
            Username
            <input id="authUsername" type="text" autocomplete="username" placeholder="crypto_player" minlength="3" maxlength="16" required />
          </label>
          <label id="displayNameField" hidden>
            Display name
            <input id="authDisplayName" type="text" autocomplete="nickname" placeholder="Crypto Player" maxlength="32" />
          </label>
          <label>
            Password
            <input id="authPassword" type="password" autocomplete="current-password" placeholder="Minimum 6 characters" required />
          </label>
          <button class="primary-button auth-submit" type="submit">Enter Arena</button>
          <p class="auth-message" id="authMessage" role="status"></p>
        </form>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
